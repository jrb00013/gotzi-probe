services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: probe
      POSTGRES_PASSWORD: probe
      POSTGRES_DB: probe
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U probe"]
      interval: 3s
      timeout: 3s
      retries: 5

  app:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    ports:
      - "8000:8000"
    environment:
      PROBE_DATABASE_URL: postgresql://probe:probe@postgres:5432/probe
      PROBE_HOST: "0.0.0.0"
      PROBE_PORT: "8000"
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data: {}
